<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!--
    Content Security Policy.
    'unsafe-inline' is required in style-src because the app uses inline style
    attributes throughout (e.g. style="color:..."). These will be progressively
    moved to CSS classes during the modularisation steps.
    script-src has no 'unsafe-inline' — Vite's hashed output files satisfy this,
    which is the key security improvement over the original single-file build.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co http://localhost:* ws://localhost:*;
    img-src 'self' data: blob:;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">

  <meta name="theme-color" content="#090e1a" id="theme-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
